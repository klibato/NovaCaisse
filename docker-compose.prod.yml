services:
  traefik:
    image: traefik:v3.0
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - letsencrypt:/letsencrypt
    environment:
      OVH_ENDPOINT: ${OVH_ENDPOINT}
      OVH_APPLICATION_KEY: ${OVH_APPLICATION_KEY}
      OVH_APPLICATION_SECRET: ${OVH_APPLICATION_SECRET}
      OVH_CONSUMER_KEY: ${OVH_CONSUMER_KEY}
    networks:
      - web
      - internal

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-novacaisse}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: novacaisse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-novacaisse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-novacaisse}:${DB_PASSWORD}@db:5432/novacaisse
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://*.novacaisse.fr}
      NODE_ENV: production
      PORT: "4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.novacaisse.fr`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.tls.domains[0].main=novacaisse.fr"
      - "traefik.http.routers.api.tls.domains[0].sans=*.novacaisse.fr"
      - "traefik.http.routers.api.middlewares=rate-limit@file,security-headers@file,gzip@file"
      - "traefik.http.services.api.loadbalancer.server.port=4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - web

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.novacaisse.fr}
      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      # Route novacaisse.fr (landing)
      - "traefik.http.routers.web.rule=Host(`novacaisse.fr`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.web.middlewares=security-headers@file,gzip@file"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      # Route *.novacaisse.fr (tenant subdomains)
      - "traefik.http.routers.web-tenants.rule=HostRegexp(`^.+\\.novacaisse\\.fr$`)"
      - "traefik.http.routers.web-tenants.entrypoints=websecure"
      - "traefik.http.routers.web-tenants.tls.certresolver=letsencrypt"
      - "traefik.http.routers.web-tenants.middlewares=security-headers@file,gzip@file"
      - "traefik.http.routers.web-tenants.service=web"
      - "traefik.http.routers.web-tenants.priority=1"
    depends_on:
      - api
    networks:
      - internal
      - web

  cron:
    build:
      context: ./scripts
      dockerfile: Dockerfile.cron
    restart: always
    environment:
      DB_USER: ${DB_USER:-novacaisse}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_NAME: novacaisse
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-fr-par}
      API_URL: http://api:4000
      WEB_URL: http://web:3000
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
    volumes:
      - backup-data:/tmp/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  backup-data:

networks:
  web:
    name: web
  internal:
    name: internal
