name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/novacaisse
            bash deploy.sh

      - name: Healthcheck API
        run: |
          echo "Waiting for API to be ready..."
          sleep 30
          for i in $(seq 1 10); do
            if curl -sf --max-time 10 https://api.novacaisse.fr/health > /dev/null 2>&1; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Attempt $i/10 failed, retrying in 10s..."
            sleep 10
          done
          echo "ERROR: API healthcheck failed after 10 attempts"
          exit 1

      - name: Notify deployment result
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            if [ "${{ job.status }}" = "success" ]; then
              echo "[$(date)] Deployment SUCCESS" >> /opt/novacaisse/deploy.log
            else
              echo "[$(date)] Deployment FAILED" >> /opt/novacaisse/deploy.log
            fi
